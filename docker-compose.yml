services:
  postgres:
    image: postgres:16-alpine
    container_name: crud-golang-db
    environment:
      POSTGRES_USER: hugo
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: crud_go
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
